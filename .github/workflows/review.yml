name: goose review

on:
  schedule:
    # every 10 minutes (GitHub may delay or skip runs under load — accepted)
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without posting/editing comments'
        required: false
        default: 'false'

concurrency:
  group: goose-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run goose
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_REPO: tile-ai/TileOPs
          TARGET_AUTHOR: superAngGao
          BOT_USERNAME: Gabbering
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m src.main
