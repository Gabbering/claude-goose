name: goose review

on:
  schedule:
    # Every 10 minutes, offset off the top of the hour to avoid GitHub's
    # high-load periods (which start at :00 of every hour and routinely
    # delay or skip workflows scheduled there).
    # Triggers at: :03 :13 :23 :33 :43 :53
    - cron: '3-59/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without posting/editing comments'
        required: false
        default: 'false'

concurrency:
  group: goose-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run goose
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          # Override the default model here if your proxy doesn't carry opus 4.6.
          # Leave unset to use the default (claude-opus-4-6).
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          TARGET_REPO: tile-ai/TileOPs
          TARGET_AUTHOR: superAngGao
          BOT_USERNAME: Gabbering
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m src.main
